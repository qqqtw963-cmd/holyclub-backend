<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이긴자 인증 메일입니다</title>
</head>
<body style="margin:0; padding:0; background-color:#ffffff; color:#111827;
             font-family:'맑은 고딕','Malgun Gothic','돋움',Dotum, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;">

  <!-- 전체 래퍼 (가운데 정렬) -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; margin:0; padding:0;">
    <tr>
      <td align="center" style="padding:0; margin:0;">

        <!-- 본문 컨테이너 (고정폭 600 권장) -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; width:600px; margin:0 auto;">
          <!-- 상단 초록 라인 -->
          <tr>
            <td style="height:6px; line-height:6px; font-size:0; background-color:#175a4c;">&nbsp;</td>
          </tr>

          <!-- 상단 여백 -->
          <tr>
            <td style="height:40px; line-height:40px; font-size:0;">&nbsp;</td>
          </tr>

          <!-- 로고 영역 -->
          <tr>
            <td style="padding:0 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                <tr>
                  <td valign="middle" style="padding:0; margin:0;">
                    <img
                      src="https://overcomer-dev-bucket.s3.ap-northeast-2.amazonaws.com/_static/img/Logo.png"
                      alt="이긴자 로고"
                      height="36"
                      style="display:block; border:0; outline:none; text-decoration:none; height:36px; width:auto;"
                    />
                  </td>
                </tr>
              </table>
            </td>
          </tr>


          <!-- 로고 아래 여백 -->
          <tr>
            <td style="height:56px; line-height:56px; font-size:0;">&nbsp;</td>
          </tr>

          <!-- 제목 -->
          <tr>
            <td style="padding:0 32px; font-size:34px; font-weight:700; letter-spacing:-0.04em; color:#111827;">
              이긴자 인증 메일입니다
            </td>
          </tr>

          <!-- 제목 아래 여백 -->
          <tr>
            <td style="height:28px; line-height:28px; font-size:0;">&nbsp;</td>
          </tr>

          <!-- 본문 문구 -->
          <tr>
            <td style="padding:0 32px; font-size:16px; line-height:27px; color:#111827;">
              <div style="margin:0; padding:0; font-weight:600;">환영합니다!</div>
              <div style="margin:8px 0 0 0; padding:0;">
                이메일 인증 절차에 따라 이메일 인증번호를 발급해드립니다.
              </div>
              <div style="margin:6px 0 0 0; padding:0;">
                이긴자와 함께 믿음의 여정을 시작해보세요!
              </div>
            </td>
          </tr>

          <!-- 본문 아래 여백 -->
          <tr>
            <td style="height:32px; line-height:32px; font-size:0;">&nbsp;</td>
          </tr>

          <!-- 인증번호 박스 -->
          <tr>
            <td style="padding:0 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                     style="border-collapse:collapse; background-color:#f8f9fa; border:1px solid #e5e7eb;">
                <tr>
                  <td align="center" style="padding:28px 16px;">
                    <div style="font-size:36px; font-weight:700; letter-spacing:0.12em; color:#111827; line-height:1;">
                      {{ code }}
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- 인증번호 박스 아래 여백 -->
          <tr>
            <td style="height:56px; line-height:56px; font-size:0;">&nbsp;</td>
          </tr>

          <!-- 구분선 + 푸터 -->
          <tr>
            <td style="padding:0 32px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                <tr>
                  <td style="border-top:1px solid #e5e7eb; height:1px; line-height:1px; font-size:0;">&nbsp;</td>
                </tr>
                <tr>
                  <td style="padding:16px 0 32px 0; font-size:12px; color:#9ca3af; line-height:18px;">
                    본 메일은 발신전용으로 회신되지 않습니다.
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /본문 컨테이너 -->

      </td>
    </tr>
  </table>
</body>
</html>
